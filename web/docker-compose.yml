# Casa Gracia — full stack: Nginx (edge) -> app replicas -> Postgres.
#
#   docker compose up -d --build              # start
#   docker compose up -d --scale web=3        # run 3 app replicas under Nginx
#
# You manage the database: either keep the bundled `db` service below, or delete
# it and point DATABASE_URL at your own Postgres in the .env file.

services:
  web:
    build: .
    env_file: .env
    environment:
      # If you keep the bundled db service, this default wires it up.
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://casagracia:casagracia@db:5432/casagracia}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-3}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # No host port + no container_name -> Nginx load-balances N replicas.

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      # - "443:443"   # add TLS (e.g. mount certs / use a companion like certbot)
    depends_on:
      - web
    restart: unless-stopped

  # ---- Bundled Postgres (delete this block to use your own DB) -------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: casagracia
      POSTGRES_PASSWORD: casagracia
      POSTGRES_DB: casagracia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casagracia"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
