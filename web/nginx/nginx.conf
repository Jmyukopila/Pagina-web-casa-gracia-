# Nginx reverse proxy: TLS termination point, static caching, gzip, rate limiting,
# and load balancing across app replicas. This is what keeps the site fast and
# stable under traffic spikes.

upstream casagracia_app {
    # Docker DNS resolves "web" to all replicas; least_conn spreads load evenly.
    least_conn;
    server web:8000;
    keepalive 32;
}

# Basic abuse protection: per-IP request rate with a burst allowance.
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;

    client_max_body_size 4m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml font/woff2;

    # Static assets: serve straight from the app container with long cache.
    location /static/ {
        proxy_pass http://casagracia_app;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }

    # Health check (no rate limit).
    location = /health {
        proxy_pass http://casagracia_app;
        access_log off;
    }

    # Wompi webhook: do not rate-limit the payment provider.
    location = /api/wompi/webhook {
        proxy_pass http://casagracia_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=req_limit burst=40 nodelay;
        limit_conn conn_limit 25;

        proxy_pass http://casagracia_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
