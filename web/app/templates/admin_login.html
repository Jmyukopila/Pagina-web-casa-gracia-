<!DOCTYPE html>
<html lang="es">
{% from "_icons.html" import icon %}
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Acceso · {{ hotel.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v={{ asset_v }}">
  <link rel="stylesheet" href="/static/css/admin.css?v={{ asset_v }}">
</head>
<body>
  <div class="adm-login">
    <form class="adm-login__card" method="post" action="/admin/login">
      <div class="adm-login__brand">
        <span class="adm-brand__mark">{{ icon('shield', 20) }}</span>
        <div>
          <h1>Panel de administración</h1>
          <p class="muted">{{ hotel.name }}</p>
        </div>
      </div>

      {% if bad %}<div class="adm-error">Usuario o contraseña incorrectos.</div>{% endif %}

      <div class="adm-field">
        <label for="adm-user">Usuario</label>
        <input id="adm-user" type="text" name="user" autocomplete="username"
               autofocus required>
      </div>
      <div class="adm-field">
        <label for="adm-pass">Contraseña</label>
        <input id="adm-pass" type="password" name="password"
               autocomplete="current-password" required>
      </div>

      <button class="btn btn--block" type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
